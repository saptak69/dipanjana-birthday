<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 22nd Birthday Dipanjana!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'float': 'float 20s ease-in-out infinite',
              'flicker': 'flicker 0.1s infinite alternate',
              'smoke-rise': 'smoke-rise 2s forwards',
              'confetti': 'confetti 3s linear forwards',
              'fade-in-up': 'fadeInUp 1s ease-out'
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0) translateX(0)' },
                '50%': { transform: 'translateY(-20px) translateX(10px)' }
              },
              flicker: {
                '0%, 100%': { transform: 'scale(1)', opacity: '1' },
                '50%': { transform: 'scale(1.1) skewX(2deg)', opacity: '0.8' }
              },
              'smoke-rise': {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '0.8' },
                '100%': { transform: 'translateY(-50px) scale(2)', opacity: '0' }
              },
              confetti: {
                '0%': { transform: 'translateY(0) rotate(0deg)', opacity: '1' },
                '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: '0' }
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
